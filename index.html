<!DOCTYPE html>
<html>
<head>
  <title>Космический шутер</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Экран авторизации -->
  <div id="authScreen" class="auth-screen">
    <h2>Введите пароль для доступа к игре</h2>
    <input type="password" id="passwordInput" placeholder="Пароль">
    <button id="authButton">Войти</button>
    <div id="errorMessage" class="error-message"></div>
  </div>

  <!-- Игровой интерфейс (изначально скрыт) -->
  <div id="gameInterface" style="display: none;">
    <h1>Космический шутер</h1>
    <div class="stats">
      Очки: <span id="score">0</span> |
      Жизни: <span id="lives">8</span> |
      Уровень: <span id="level">1</span>
    </div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <button id="startButton">Начать игру</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
